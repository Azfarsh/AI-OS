# AIS-OS Terminal Runtime Configuration
# Maps to Four Cs: Context, Connections, Capabilities, Cadence

app:
  name: AIS-OS
  version: "0.1.0"
  workspace: "."

models:
  default: anthropic/claude-3.5-sonnet
  openrouter_base_url: https://openrouter.ai/api/v1
  routing:
    # Task-type → preferred model (OpenRouter ids)
    chat: anthropic/claude-3.5-sonnet
    code: anthropic/claude-3.5-sonnet
    research: google/gemini-2.0-flash-001
    planning: anthropic/claude-3.5-sonnet
    fast: google/gemini-2.0-flash-001
    local: ollama/llama3.2
  available:
    - id: anthropic/claude-3.5-sonnet
      label: Claude 3.5 Sonnet
    - id: openai/gpt-4.1
      label: GPT-4.1
    - id: google/gemini-2.0-flash-001
      label: Gemini 2.0 Flash
    - id: deepseek/deepseek-chat
      label: DeepSeek Chat
    - id: ollama/llama3.2
      label: Ollama Llama 3.2 (local)

memory:
  chroma_path: ./memory/chroma
  markdown_dir: ./memory/notes
  short_term_max_messages: 40
  retrieval_top_k: 6
  embed_model: openai/text-embedding-3-small

agents:
  default: executive_agent
  max_retries: 2
  permissions:
    terminal: true
    filesystem: true
    browser: false
    email: false

terminal:
  stream: true
  show_agent_feed: true
  prompt: "ais> "

voice:
  enabled: false
  wake_word: Jarvis
  push_to_talk: true
  elevenlabs_voice_id: ""

mcp:
  servers: []

integrations:
  github: { enabled: false }
  slack: { enabled: false }
  google_workspace: { enabled: false }

logging:
  level: INFO
  dir: ./logs
